<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas Discord - NEXUS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        /* HEADER NEXUS */
        .header-nexus {
            display: flex;
            align-items: stretch;
            background: #e6e6e6;
            border: 3px solid #000;
            margin: 0 auto 40px auto;
            max-width: 1600px;
        }

        .nexus-box {
            background: linear-gradient(180deg, #8b1a1a 0%, #5a0f0f 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 3px solid #000;
            min-width: 200px;
        }

        .nexus-logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .nexus-logo .x {
            color: #ff0000;
            font-size: 48px;
        }

        .titulo-principal {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-style: italic;
            font-weight: bold;
            color: #000;
            padding: 20px;
            text-align: center;
        }

        .nexus-box-right {
            background: linear-gradient(180deg, #8b1a1a 0%, #5a0f0f 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 3px solid #000;
            min-width: 200px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .box {
            background: #2a1515;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #3d2020;
        }

        .box:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .box h3 {
            margin: 0 0 20px 0;
            color: #ff3b3b;
            font-size: 20px;
            font-weight: 600;
            padding-bottom: 12px;
            border-bottom: 2px solid #8b2020;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: #d4a8a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], 
        input[type="date"], 
        input[type="time"], 
        select, 
        textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 2px solid #3d2020;
            outline: none;
            background: #1a0a0a;
            color: #fff;
            font-size: 14px;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: border-color 0.3s, background 0.3s;
        }

        input[type="text"]:focus, 
        input[type="date"]:focus, 
        input[type="time"]:focus, 
        select:focus, 
        textarea:focus {
            border-color: #ff3b3b;
            background: #250f0f;
        }

        input::placeholder, textarea::placeholder {
            color: #6b4545;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ff3b3b 0%, #c41f1f 100%);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(255, 59, 59, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, #e63030 0%, #a81818 100%);
            box-shadow: 0 6px 20px rgba(255, 59, 59, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .output, .result {
            background: #150808;
            padding: 14px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #3d2020;
            word-break: break-all;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            min-height: 45px;
            display: flex;
            align-items: center;
            user-select: text;
        }

        pre {
            background: #0a0404;
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            overflow-x: auto;
            border: 1px solid #2a1515;
        }

        .checkbox-group {
            background: #1a0a0a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 8px;
            border: 2px solid #3d2020;
        }

        .checkbox-item {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .checkbox-item:last-child {
            margin-bottom: 0;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 10px;
            accent-color: #ff3b3b;
        }

        .checkbox-item label {
            display: inline;
            margin: 0;
            font-weight: normal;
            font-size: 14px;
            color: #e0e0e0;
            text-transform: none;
            letter-spacing: normal;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .header-nexus {
                flex-direction: column;
            }

            .nexus-box, .nexus-box-right {
                border-right: none;
                border-left: none;
                border-bottom: 3px solid #000;
                min-width: 100%;
            }

            .nexus-box-right {
                border-bottom: none;
                border-top: 3px solid #000;
            }

            .titulo-principal {
                font-size: 24px;
            }

            .container {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header-nexus">
    <div class="nexus-box">
        <div class="nexus-logo">NE<span class="x">X</span>US</div>
    </div>
    <div class="titulo-principal">
        Ferramentas Discord
    </div>
    <div class="nexus-box-right">
        <div class="nexus-logo">NE<span class="x">X</span>US</div>
    </div>
</div>

<div class="container">

    <!-- 1 - GERADOR @ -->
    <div class="box">
        <h3>👤 Gerador de @ Discord</h3>

        <label>ID do Usuário:</label>
        <input type="text" id="discordId" placeholder="Digite o ID do usuário">

        <button onclick="gerarMention()">Gerar @</button>

        <div class="result" id="resultadoMention">A menção aparecerá aqui</div>

        <button onclick="copiarMention()">📋 Copiar @</button>
    </div>

    <!-- 3 - GERADOR TRIAL -->
    <div class="box">
        <h3>🔧 PEDIDOS ADV / UNBAN / BAN / DEVOLUÇÃO (PRINCIPAL)</h3>

        <label>Tipo de Pedido</label>
        <select id="tipo">
            <option value="ADV">ADV</option>
            <option value="UNBAN">UNBAN</option>
            <option value="BAN">BAN</option>
            <option value="DEVOLUCAO">DEVOLUÇÃO DE ITENS</option>
        </select>

        <label>ID</label>
        <input id="idJogador" placeholder="Ex: 123">

        <label>Motivo</label>
        <textarea id="motivo" placeholder="Descreva o motivo"></textarea>

        <div id="campoItensTrial" style="display: none;">
            <label>Itens (apenas para devolução)</label>
            <textarea id="itens" placeholder="Ex: Pistola x1, Dinheiro x50k"></textarea>
        </div>

        <label>Link da log/ msg / Provas</label>
        <input id="provas" placeholder="https://...">

        <label>Selecione os Cargos</label>
        <div class="checkbox-group">
            <div class="checkbox-item">
                <input type="checkbox" id="cargoStaffTrial" value="834230769811324988">
                <label for="cargoStaffTrial">Staff</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="cargoSupervisorTrial" value="898442078760108032">
                <label for="cargoSupervisorTrial">Supervisor</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="cargoAdminTrial" value="635565644175114316">
                <label for="cargoAdminTrial">Admin</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="cargoAdminLogTrial" value="1362168080716927133">
                <label for="cargoAdminLogTrial">Admin (Discord Log)</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="cargoSupervisorLogTrial" value="1362168080716927132">
                <label for="cargoSupervisorLogTrial">Supervisor (Discord Log)</label>
            </div>
        </div>

        <button onclick="gerarTrial()">Gerar Mensagem</button>

        <label>Resultado</label>
        <textarea id="resultadoTrial" readonly></textarea>

        <button onclick="copiarTrial()">📋 Copiar Mensagem</button>
    </div>

    <!-- 2 - GERADOR PROVAS PUNIÇÃO -->
    <div class="box">
        <h3>⚖️ Gerador de Provas Punição (LOGS)</h3>

        <label>Tipo de Punição</label>
        <select id="tipoPunicao">
            <option value="ADV">ADV</option>
            <option value="BAN">BAN</option>
        </select>

        <div id="camposDenuncianteADV">
            <label>Denunciante</label>
            <input id="denunciante" placeholder="Nome do denunciante">

            <label>Denunciado</label>
            <input id="denunciado" placeholder="Nome do denunciado">
        </div>

        <div id="camposIDBAN" style="display: none;">
            <label>ID</label>
            <input id="idBan" placeholder="Ex: 123">
        </div>

        <label>Motivo</label>
        <textarea id="motivoPunicao" placeholder="Descreva o motivo"></textarea>

        <label>Provas</label>
        <textarea id="provasPunicao" placeholder="Cole os links das provas"></textarea>

        <button onclick="gerarProvasPunicao()">Gerar Provas</button>

        <label>Resultado</label>
        <textarea id="resultadoProvasPunicao" readonly></textarea>

        <button onclick="copiarProvasPunicao()">📋 Copiar Provas</button>
    </div>

    <!-- 4 - GERADOR SOLICITAÇÕES -->
    <div class="box">
        <h3>📋 Gerador de Solicitações (LOGS)</h3>

        <label>Tipo de Solicitação</label>
        <select id="tipoSolicitacao" onchange="atualizarCamposSolicitacao()">
            <option value="UNBAN">UNBAN</option>
            <option value="TELA">TELA</option>
            <option value="RESET">RESET</option>
            <option value="DEVOLUCAO_SOL">DEVOLUÇÃO</option>
            <option value="ADM">ADM</option>
        </select>

        <label>ID</label>
        <input id="idSolicitacao" placeholder="Ex: 123">

        <label>Motivo</label>
        <textarea id="motivoSolicitacao" placeholder="Descreva o motivo"></textarea>

        <div id="campoObservacaoSol" style="display: block;">
            <label>CDS (Observação)</label>
            <textarea id="observacaoSolicitacao" placeholder="Ex: Não tem o clipe do ocorrido porém a cds bate com o local informado pelo o mesmo. Log normal."></textarea>
        </div>

        <div id="campoItensSol" style="display: none;">
            <label>Itens</label>
            <textarea id="itensSolicitacao" placeholder="Coloque todos os itens que foram perdidos"></textarea>
        </div>

        <label id="labelProvas">Clipe</label>
        <textarea id="provasSolicitacao" placeholder="Anexe os vídeos e se possível log"></textarea>

        <div id="campoCargosSol" style="display: block;">
            <label>Selecione os Cargos</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="cargoStaff" value="834230769811324988">
                    <label for="cargoStaff">Staff</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cargoSupervisor" value="898442078760108032">
                    <label for="cargoSupervisor">Supervisor</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cargoAdmin" value="635565644175114316">
                    <label for="cargoAdmin">Admin</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cargoAdminLog" value="1362168080716927133">
                    <label for="cargoAdminLog">Admin (Discord Log)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cargoSupervisorLog" value="1362168080716927132">
                    <label for="cargoSupervisorLog">Supervisor (Discord Log)</label>
                </div>
            </div>
        </div>

        <button onclick="gerarSolicitacao()">Gerar Solicitação</button>

        <label>Resultado</label>
        <textarea id="resultadoSolicitacao" readonly></textarea>

        <button onclick="copiarSolicitacao()">📋 Copiar Solicitação</button>
    </div>

</div>

<script>
// Proteção contra seleção e cópia do código
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});

document.addEventListener('keydown', function(e) {
    // Bloquear F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
    if (e.keyCode === 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
        (e.ctrlKey && e.keyCode === 85)) {
        e.preventDefault();
        return false;
    }
});

/* ===== MENÇÃO ===== */
function gerarMention() {
    const id = document.getElementById("discordId").value.trim();
    const output = document.getElementById("resultadoMention");

    if (!id || isNaN(id)) {
        output.textContent = "❌ ID inválido";
        return;
    }

    output.textContent = `<@${id}>`;
}

function copiarMention() {
    const text = document.getElementById("resultadoMention").textContent;
    if (text !== "A menção aparecerá aqui" && text !== "❌ ID inválido") {
        navigator.clipboard.writeText(text).then(() => {
            // Copiado silenciosamente
        }).catch(err => {
            console.error('Erro ao copiar:', err);
        });
    }
}

/* ===== GERADOR PROVAS PUNIÇÃO ===== */
function gerarProvasPunicao() {
    const tipo = document.getElementById("tipoPunicao").value;
    const motivo = document.getElementById("motivoPunicao").value;
    const provas = document.getElementById("provasPunicao").value;

    let texto = "";

    if (tipo === "ADV") {
        const denunciante = document.getElementById("denunciante").value;
        const denunciado = document.getElementById("denunciado").value;
        
        texto = `**ADV**\n`;
        texto += `**Denunciante**: ${denunciante}\n`;
        texto += `**Denunciado**: ${denunciado}\n`;
        texto += `**Motivo**: ${motivo}\n`;
        texto += `**Provas**: ${provas}`;
    } else {
        const id = document.getElementById("idBan").value;
        
        texto = `**BAN**\n`;
        texto += `**ID**: ${id}\n`;
        texto += `**Motivo**: ${motivo}\n`;
        texto += `**Provas**: ${provas}`;
    }

    document.getElementById("resultadoProvasPunicao").value = texto;
}

function copiarProvasPunicao() {
    const text = document.getElementById("resultadoProvasPunicao").value;
    if (text) {
        navigator.clipboard.writeText(text).then(() => {
            // Copiado silenciosamente
        }).catch(err => {
            console.error('Erro ao copiar:', err);
        });
    }
}

// Atualizar campos ao mudar tipo de punição e tipo de pedido
document.addEventListener('DOMContentLoaded', function() {
    const selectPunicao = document.getElementById("tipoPunicao");
    if (selectPunicao) {
        selectPunicao.addEventListener("change", function() {
            const tipo = this.value;
            const camposDenunciante = document.getElementById("camposDenuncianteADV");
            const camposID = document.getElementById("camposIDBAN");
            
            if (tipo === "ADV") {
                camposDenunciante.style.display = "block";
                camposID.style.display = "none";
            } else {
                camposDenunciante.style.display = "none";
                camposID.style.display = "block";
            }
        });
    }

    // Atualizar campos ao mudar tipo de pedido (TRIAL)
    const selectTrial = document.getElementById("tipo");
    if (selectTrial) {
        selectTrial.addEventListener("change", function() {
            const tipo = this.value;
            const campoItensTrial = document.getElementById("campoItensTrial");
            
            if (tipo === "DEVOLUCAO") {
                campoItensTrial.style.display = "block";
            } else {
                campoItensTrial.style.display = "none";
            }
        });
    }
});

/* ===== GERADOR TRIAL ===== */
function gerarTrial() {
    const tipo = document.getElementById("tipo").value;
    const id = document.getElementById("idJogador").value;
    const motivo = document.getElementById("motivo").value;
    const itens = document.getElementById("itens").value;
    const provas = document.getElementById("provas").value;

    let texto = `**Solicito ${tipo === "DEVOLUCAO" ? "DEVOLUÇÃO DE ITENS" : tipo}**\n`;
    texto += `**ID:** ${id}\n`;
    if (tipo === "DEVOLUCAO") {
        texto += `**Itens:** ${itens}\n`;
    }
    texto += `**Motivo:** ${motivo}\n`;
    texto += `**Provas:** ${provas}`;

    const cargosSelecionados = [];
    
    if (document.getElementById("cargoStaffTrial").checked) {
        cargosSelecionados.push("<@&834230769811324988>");
    }
    if (document.getElementById("cargoSupervisorTrial").checked) {
        cargosSelecionados.push("<@&898442078760108032>");
    }
    if (document.getElementById("cargoAdminTrial").checked) {
        cargosSelecionados.push("<@&635565644175114316>");
    }
    if (document.getElementById("cargoAdminLogTrial").checked) {
        cargosSelecionados.push("<@&1362168080716927133>");
    }
    if (document.getElementById("cargoSupervisorLogTrial").checked) {
        cargosSelecionados.push("<@&1362168080716927132>");
    }

    if (cargosSelecionados.length > 0) {
        texto += `\n${cargosSelecionados.join(" ")}`;
    }

    document.getElementById("resultadoTrial").value = texto;
}

function copiarTrial() {
    const text = document.getElementById("resultadoTrial").value;
    if (text) {
        navigator.clipboard.writeText(text).then(() => {
            // Copiado silenciosamente
        }).catch(err => {
            console.error('Erro ao copiar:', err);
        });
    }
}

/* ===== GERADOR SOLICITAÇÕES ===== */
function atualizarCamposSolicitacao() {
    const tipo = document.getElementById("tipoSolicitacao").value;
    const campoObservacao = document.getElementById("campoObservacaoSol");
    const campoItens = document.getElementById("campoItensSol");
    const campoCargosSol = document.getElementById("campoCargosSol");
    const placeholderProvas = document.getElementById("provasSolicitacao");
    const placeholderMotivo = document.getElementById("motivoSolicitacao");

    if (tipo === "DEVOLUCAO_SOL") {
        campoObservacao.style.display = "none";
        campoItens.style.display = "block";
        campoCargosSol.style.display = "block";
        placeholderMotivo.placeholder = "Explique o motivo da devolução";
        placeholderProvas.placeholder = "PROVAS SEMPRE CLIPE QUE COMPROVE O MOTIVO DA DEVOLUÇÃO, PODE ANEXAR LOG TAMBÉM";
    } 
    else if (tipo === "UNBAN") {
        campoObservacao.style.display = "block";
        campoItens.style.display = "none";
        campoCargosSol.style.display = "block";
        placeholderMotivo.placeholder = "Resumo objetivo do que o jogador alegou + contexto";
        placeholderProvas.placeholder = "Link do clipe (ou deixe vazio se não houver)";
        document.getElementById("observacaoSolicitacao").placeholder = "Informe se a CDS confere ou não confere - local informado pelo jogador x local do ban";
    } 
    else {
        campoObservacao.style.display = "none";
        campoItens.style.display = "none";
        campoCargosSol.style.display = "block";
        
        if (tipo === "TELA") {
            placeholderMotivo.placeholder = "Escreva quantas kills o mesmo fez na ação, explique o pq ele é suspeito";
            placeholderProvas.placeholder = "Anexe os vídeos e se possível log para ADMINISTRADOR avaliar";
        } else if (tipo === "RESET") {
            placeholderMotivo.placeholder = "Explique qual motivo do reset";
            placeholderProvas.placeholder = "Anexo das provas";
        } else if (tipo === "ADM") {
            placeholderMotivo.placeholder = "Descreva o motivo";
            placeholderProvas.placeholder = "Anexe os vídeos e se possível log";
        }
    }
}

function gerarSolicitacao() {
    const tipo = document.getElementById("tipoSolicitacao").value;
    const id = document.getElementById("idSolicitacao").value;
    const motivo = document.getElementById("motivoSolicitacao").value;
    const observacao = document.getElementById("observacaoSolicitacao").value;
    const itens = document.getElementById("itensSolicitacao").value;
    const provas = document.getElementById("provasSolicitacao").value;

    let texto = "";

    if (tipo === "UNBAN") {
        // Modelo padrão para UNBAN
        texto = `**SOLICITAÇÃO DE UNBAN**\n`;
        texto += `**ID:** ${id}\n`;
        texto += `**Motivo do ban:** ${motivo}\n`;
        texto += `**Clipe:** ${provas || "não tem clipe"}\n`;
        texto += `**CDS:** ${observacao}`;
    } else {
        // Modelo para outros tipos
        let tipoTexto = tipo === "DEVOLUCAO_SOL" ? "DEVOLUÇÃO" : tipo;
        texto = `**SOLICITAÇÃO DE ${tipoTexto}**\n`;
        texto += `**ID:** ${id}\n`;
        texto += `**Motivo:** ${motivo}\n`;
        
        if (tipo === "DEVOLUCAO_SOL") {
            texto += `**Itens:** ${itens}\n`;
        }
        
        texto += `**Provas:** ${provas}`;
    }

    const cargosSelecionados = [];
    
    if (document.getElementById("cargoStaff").checked) {
        cargosSelecionados.push("<@&834230769811324988>");
    }
    if (document.getElementById("cargoSupervisor").checked) {
        cargosSelecionados.push("<@&898442078760108032>");
    }
    if (document.getElementById("cargoAdmin").checked) {
        cargosSelecionados.push("<@&635565644175114316>");
    }
    if (document.getElementById("cargoAdminLog").checked) {
        cargosSelecionados.push("<@&1362168080716927133>");
    }
    if (document.getElementById("cargoSupervisorLog").checked) {
        cargosSelecionados.push("<@&1362168080716927132>");
    }

    if (cargosSelecionados.length > 0) {
        texto += `\n${cargosSelecionados.join(" ")}`;
    }

    document.getElementById("resultadoSolicitacao").value = texto;
}

function copiarSolicitacao() {
    const text = document.getElementById("resultadoSolicitacao").value;
    if (text) {
        navigator.clipboard.writeText(text).then(() => {
            // Copiado silenciosamente
        }).catch(err => {
